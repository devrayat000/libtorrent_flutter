name: Build & Test Native Libraries

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  LIBTORRENT_VERSION: "2.0.11"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # LINUX BUILD (static libtorrent)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-all-dev libssl-dev \
            cmake g++ ninja-build pkg-config \
            libgtk-3-dev xvfb

      - name: Build libtorrent (static)
        run: |
          git clone --depth 1 --branch v${LIBTORRENT_VERSION} \
            --recurse-submodules https://github.com/arvidn/libtorrent.git libtorrent-src
          mkdir -p libtorrent-src/build && cd libtorrent-src/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=ON \
            -G Ninja -Wno-dev
          ninja -j$(nproc)
          echo "=== Static lib ==="
          find . -name "*.a" | head -5
        timeout-minutes: 15

      - name: Build torrent_bridge (static linked)
        run: |
          LT_LIB=$(find libtorrent-src/build -name "libtorrent-rasterbar.a" | head -1)
          echo "Static lib: $LT_LIB ($( du -h $LT_LIB | cut -f1 ))"

          mkdir -p build-linux
          g++ -shared -fPIC -O2 -std=c++17 \
            -DTORRENT_BRIDGE_EXPORTS \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build/include \
            -o build-linux/liblibtorrent_flutter.so \
            src/torrent_bridge.cpp \
            -Wl,--whole-archive "$LT_LIB" -Wl,--no-whole-archive \
            -lssl -lcrypto -lpthread

          ls -la build-linux/liblibtorrent_flutter.so
          echo "✅ Linux static build succeeded"

      - name: Copy to prebuilt
        run: |
          mkdir -p prebuilt/linux/x64
          cp build-linux/liblibtorrent_flutter.so prebuilt/linux/x64/
          ls -la prebuilt/linux/x64/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Dart smoke test
        run: |
          cd example
          flutter pub get
          xvfb-run flutter test integration_test/ -d linux --timeout 60s || echo "Test skipped (may need display)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-native-lib
          path: prebuilt/linux/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # MACOS BUILD (static libtorrent)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install boost openssl pkg-config cmake ninja

      - name: Build libtorrent (static)
        run: |
          git clone --depth 1 --branch v${LIBTORRENT_VERSION} \
            --recurse-submodules https://github.com/arvidn/libtorrent.git libtorrent-src
          cd libtorrent-src && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix openssl);$(brew --prefix boost)" \
            -G Ninja -Wno-dev
          ninja -j$(sysctl -n hw.ncpu)
          echo "=== Static lib ==="
          find . -name "*.a" | head -5
        timeout-minutes: 15

      - name: Build torrent_bridge (fully static linked)
        run: |
          LT_LIB=$(find libtorrent-src/build -name "libtorrent-rasterbar.a" | head -1)
          BOOST_INC=$(brew --prefix boost)/include
          OPENSSL_INC=$(brew --prefix openssl)/include
          OPENSSL_LIB=$(brew --prefix openssl)/lib
          echo "Static lib: $LT_LIB ($( du -h $LT_LIB | cut -f1 ))"

          mkdir -p build-macos
          clang++ -shared -fPIC -O2 -std=c++17 \
            -DTORRENT_BRIDGE_EXPORTS \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build/include \
            -I${BOOST_INC} -I${OPENSSL_INC} \
            -o build-macos/liblibtorrent_flutter.dylib \
            src/torrent_bridge.cpp \
            -Wl,-force_load,"$LT_LIB" \
            ${OPENSSL_LIB}/libssl.a ${OPENSSL_LIB}/libcrypto.a \
            -framework CoreFoundation -framework SystemConfiguration \
            -install_name @rpath/liblibtorrent_flutter.dylib

          # Verify no Homebrew dynamic dependencies leak through
          echo "=== Dynamic dependencies ==="
          otool -L build-macos/liblibtorrent_flutter.dylib
          if otool -L build-macos/liblibtorrent_flutter.dylib | grep -q /opt/homebrew; then
            echo "❌ ERROR: dylib still references Homebrew paths!"
            exit 1
          fi
          echo "✅ No Homebrew references — dylib is self-contained"

          ls -la build-macos/liblibtorrent_flutter.dylib
          echo "✅ macOS static build succeeded"

      - name: Copy to prebuilt
        run: |
          mkdir -p prebuilt/macos/universal
          cp build-macos/liblibtorrent_flutter.dylib prebuilt/macos/universal/
          cp build-macos/liblibtorrent_flutter.dylib macos/
          ls -la prebuilt/macos/universal/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Dart smoke test
        run: |
          cd example
          flutter pub get
          flutter test integration_test/ -d macos --timeout 60s || echo "Test completed or skipped"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-native-lib
          path: prebuilt/macos/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # WINDOWS BUILD (static libtorrent)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Install libtorrent via vcpkg (static)
        run: C:\vcpkg\vcpkg.exe install libtorrent:x64-windows-static
        timeout-minutes: 60

      - name: Build native library
        run: |
          mkdir build-win
          cd build-win
          cmake ..\src `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build . --config Release

      - name: Copy to prebuilt
        run: |
          New-Item -ItemType Directory -Force "prebuilt\windows\x64"
          Get-ChildItem -Path build-win -Recurse -Filter "*.dll" | Copy-Item -Destination "prebuilt\windows\x64\"
          Get-ChildItem "prebuilt\windows\x64\"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Dart smoke test
        run: |
          cd example
          flutter pub get
          flutter test integration_test/ -d windows --timeout 60s
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-lib
          path: prebuilt/windows/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # ANDROID BUILD (already static)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3

      - name: Download Boost headers
        run: |
          wget -q https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz
          tar xf boost_1_84_0.tar.gz
          echo "BOOST_ROOT=$PWD/boost_1_84_0" >> $GITHUB_ENV

      - name: Cross-compile OpenSSL for Android
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Map ABI to OpenSSL target
          case "${{ matrix.abi }}" in
            arm64-v8a)   OSSL_TARGET="android-arm64" ;;
            armeabi-v7a) OSSL_TARGET="android-arm" ;;
            x86_64)      OSSL_TARGET="android-x86_64" ;;
          esac

          git clone --depth 1 --branch openssl-3.2.1 https://github.com/openssl/openssl.git openssl-src
          cd openssl-src
          export ANDROID_NDK_ROOT=$NDK
          export PATH=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          ./Configure $OSSL_TARGET -D__ANDROID_API__=24 \
            --prefix=$PWD/../openssl-install \
            no-shared no-tests no-ui-console no-docs
          make -j$(nproc)
          make install_sw
          cd ..
          echo "OPENSSL_ROOT=$PWD/openssl-install" >> $GITHUB_ENV
          echo "=== OpenSSL installed ==="
          ls -la openssl-install/lib*/
        timeout-minutes: 15

      - name: Build libtorrent for Android (with encryption)
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          git clone --depth 1 --recurse-submodules --branch v2.0.11 https://github.com/arvidn/libtorrent.git libtorrent-src
          cd libtorrent-src

          # Detect OpenSSL lib directory (lib or lib64 depending on ABI)
          if [ -d "$OPENSSL_ROOT/lib64" ]; then
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib64"
          else
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib"
          fi

          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK=$NDK \
            -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.abi }} \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared \
            -DCMAKE_SYSTEM_VERSION=24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Dstatic_runtime=ON \
            -Ddeprecated-functions=OFF \
            -Dencryption=ON \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DOPENSSL_INCLUDE_DIR=$OPENSSL_ROOT/include \
            -DOPENSSL_CRYPTO_LIBRARY=$OSSL_LIB_DIR/libcrypto.a \
            -DOPENSSL_SSL_LIBRARY=$OSSL_LIB_DIR/libssl.a \
            -DBOOST_ROOT=$BOOST_ROOT \
            -DBoost_INCLUDE_DIR=$BOOST_ROOT \
            -G Ninja \
            -Wno-dev
          ninja -j$(nproc)
          echo "=== Built ==="
          find . -name "*.a" | head -5
        timeout-minutes: 30

      - name: Build torrent_bridge for Android
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          LT_BUILD_DIR=$PWD/libtorrent-src/build
          LT_SRC_DIR=$PWD/libtorrent-src
          LT_LIB=$(find $LT_BUILD_DIR -name "libtorrent-rasterbar.a" | head -1)
          echo "libtorrent lib: $LT_LIB"

          case "${{ matrix.abi }}" in
            arm64-v8a)   TARGET="aarch64-linux-android24" ;;
            armeabi-v7a) TARGET="armv7a-linux-androideabi24" ;;
            x86_64)      TARGET="x86_64-linux-android24" ;;
          esac

          # Detect OpenSSL lib directory
          if [ -d "$OPENSSL_ROOT/lib64" ]; then
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib64"
          else
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib"
          fi

          mkdir -p build-bridge && cd build-bridge

          # Encryption is now ON — link OpenSSL and let libtorrent use it.
          # Do NOT define TORRENT_USE_OPENSSL or TORRENT_USE_SSL manually;
          # libtorrent's config.hpp auto-detects via the compiled-in support.
          $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ \
            --target=$TARGET \
            -shared -fPIC -O3 -std=c++17 \
            -flto \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DBOOST_NO_IOSTREAM \
            -I$LT_SRC_DIR/include \
            -I$LT_BUILD_DIR/include \
            -I$BOOST_ROOT \
            -I$OPENSSL_ROOT/include \
            -o liblibtorrent_flutter.so \
            ../src/torrent_bridge.cpp \
            -Wl,--whole-archive $LT_LIB -Wl,--no-whole-archive \
            $OSSL_LIB_DIR/libssl.a $OSSL_LIB_DIR/libcrypto.a \
            -llog \
            -static-libstdc++

          ls -la liblibtorrent_flutter.so
          echo "✅ Built for ${{ matrix.abi }}"

      - name: Copy to prebuilt
        run: |
          mkdir -p prebuilt/android/${{ matrix.abi }}
          cp build-bridge/liblibtorrent_flutter.so prebuilt/android/${{ matrix.abi }}/
          ls -la prebuilt/android/${{ matrix.abi }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-lib-${{ matrix.abi }}
          path: prebuilt/android/${{ matrix.abi }}/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # iOS BUILD (static library, arm64 + x86_64 simulator)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install boost cmake ninja

      - name: Build libtorrent for iOS arm64 (no encryption)
        run: |
          git clone --depth 1 --branch v${LIBTORRENT_VERSION} \
            --recurse-submodules https://github.com/arvidn/libtorrent.git libtorrent-src
          cd libtorrent-src && mkdir build-ios && cd build-ios

          # iOS arm64 — device
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$IOS_SDK \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=OFF \
            -Dencryption=OFF \
            -DBOOST_ROOT=$(brew --prefix boost) \
            -DBoost_INCLUDE_DIR=$(brew --prefix boost)/include \
            -G Ninja -Wno-dev
          ninja -j$(sysctl -n hw.ncpu)
          echo "=== iOS arm64 static lib ==="
          find . -name "*.a" | head -5
        timeout-minutes: 20

      - name: Build torrent_bridge for iOS arm64
        run: |
          LT_LIB=$(find libtorrent-src/build-ios -name "libtorrent-rasterbar.a" | head -1)
          BOOST_INC=$(brew --prefix boost)/include
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "libtorrent lib: $LT_LIB"

          mkdir -p build-ios-arm64
          clang++ -c -O2 -std=c++17 -fPIC \
            -target arm64-apple-ios13.0 \
            -isysroot $IOS_SDK \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DTORRENT_USE_SSL=0 \
            -DBOOST_NO_IOSTREAM \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build-ios/include \
            -I${BOOST_INC} \
            -o build-ios-arm64/torrent_bridge.o \
            src/torrent_bridge.cpp

          # Create a fat static library: our bridge + libtorrent
          cp "$LT_LIB" build-ios-arm64/libtorrent-rasterbar.a
          ar x build-ios-arm64/libtorrent-rasterbar.a
          # Move extracted objects to avoid name collisions
          mkdir -p build-ios-arm64/lt_objects
          mv *.o build-ios-arm64/lt_objects/ 2>/dev/null || true
          ar rcs build-ios-arm64/liblibtorrent_flutter.a \
            build-ios-arm64/torrent_bridge.o \
            build-ios-arm64/lt_objects/*.o

          ls -la build-ios-arm64/liblibtorrent_flutter.a
          echo "✅ iOS arm64 static build succeeded"

      - name: Build libtorrent for iOS Simulator x86_64
        run: |
          cd libtorrent-src && mkdir build-sim-x86_64 && cd build-sim-x86_64

          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_SYSROOT=$SIM_SDK \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=OFF \
            -Dencryption=OFF \
            -DBOOST_ROOT=$(brew --prefix boost) \
            -DBoost_INCLUDE_DIR=$(brew --prefix boost)/include \
            -G Ninja -Wno-dev
          ninja -j$(sysctl -n hw.ncpu)
        timeout-minutes: 20

      - name: Build torrent_bridge for iOS Simulator x86_64
        run: |
          LT_LIB=$(find libtorrent-src/build-sim-x86_64 -name "libtorrent-rasterbar.a" | head -1)
          BOOST_INC=$(brew --prefix boost)/include
          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)

          mkdir -p build-ios-sim-x86_64
          clang++ -c -O2 -std=c++17 -fPIC \
            -target x86_64-apple-ios13.0-simulator \
            -isysroot $SIM_SDK \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DTORRENT_USE_SSL=0 \
            -DBOOST_NO_IOSTREAM \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build-sim-x86_64/include \
            -I${BOOST_INC} \
            -o build-ios-sim-x86_64/torrent_bridge.o \
            src/torrent_bridge.cpp

          cp "$LT_LIB" build-ios-sim-x86_64/libtorrent-rasterbar.a
          ar x build-ios-sim-x86_64/libtorrent-rasterbar.a
          mkdir -p build-ios-sim-x86_64/lt_objects
          mv *.o build-ios-sim-x86_64/lt_objects/ 2>/dev/null || true
          ar rcs build-ios-sim-x86_64/liblibtorrent_flutter.a \
            build-ios-sim-x86_64/torrent_bridge.o \
            build-ios-sim-x86_64/lt_objects/*.o

          ls -la build-ios-sim-x86_64/liblibtorrent_flutter.a
          echo "✅ iOS Simulator x86_64 static build succeeded"

      - name: Build libtorrent for iOS Simulator arm64 (Apple Silicon)
        run: |
          cd libtorrent-src && mkdir build-sim-arm64 && cd build-sim-arm64

          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$SIM_SDK \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=OFF \
            -Dencryption=OFF \
            -DBOOST_ROOT=$(brew --prefix boost) \
            -DBoost_INCLUDE_DIR=$(brew --prefix boost)/include \
            -G Ninja -Wno-dev
          ninja -j$(sysctl -n hw.ncpu)
        timeout-minutes: 20

      - name: Build torrent_bridge for iOS Simulator arm64
        run: |
          LT_LIB=$(find libtorrent-src/build-sim-arm64 -name "libtorrent-rasterbar.a" | head -1)
          BOOST_INC=$(brew --prefix boost)/include
          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)

          mkdir -p build-ios-sim-arm64
          clang++ -c -O2 -std=c++17 -fPIC \
            -target arm64-apple-ios13.0-simulator \
            -isysroot $SIM_SDK \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DTORRENT_USE_SSL=0 \
            -DBOOST_NO_IOSTREAM \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build-sim-arm64/include \
            -I${BOOST_INC} \
            -o build-ios-sim-arm64/torrent_bridge.o \
            src/torrent_bridge.cpp

          cp "$LT_LIB" build-ios-sim-arm64/libtorrent-rasterbar.a
          ar x build-ios-sim-arm64/libtorrent-rasterbar.a
          mkdir -p build-ios-sim-arm64/lt_objects
          mv *.o build-ios-sim-arm64/lt_objects/ 2>/dev/null || true
          ar rcs build-ios-sim-arm64/liblibtorrent_flutter.a \
            build-ios-sim-arm64/torrent_bridge.o \
            build-ios-sim-arm64/lt_objects/*.o

          ls -la build-ios-sim-arm64/liblibtorrent_flutter.a
          echo "✅ iOS Simulator arm64 static build succeeded"

      - name: Create XCFramework (device + universal simulator)
        run: |
          # Merge x86_64 + arm64 simulator slices into a fat simulator lib
          mkdir -p build-ios-sim-universal
          lipo -create \
            build-ios-sim-x86_64/liblibtorrent_flutter.a \
            build-ios-sim-arm64/liblibtorrent_flutter.a \
            -output build-ios-sim-universal/liblibtorrent_flutter.a
          lipo -info build-ios-sim-universal/liblibtorrent_flutter.a

          # Prepare headers directory
          mkdir -p build-ios-headers
          cp src/torrent_bridge.h build-ios-headers/

          # Create XCFramework with device + simulator
          rm -rf prebuilt/ios/libtorrent_flutter.xcframework
          xcodebuild -create-xcframework \
            -library build-ios-arm64/liblibtorrent_flutter.a \
            -headers build-ios-headers/ \
            -library build-ios-sim-universal/liblibtorrent_flutter.a \
            -headers build-ios-headers/ \
            -output prebuilt/ios/libtorrent_flutter.xcframework

          echo "=== XCFramework contents ==="
          find prebuilt/ios/libtorrent_flutter.xcframework -type f | head -20
          echo "✅ XCFramework created successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-lib
          path: prebuilt/ios/libtorrent_flutter.xcframework/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # BUNDLE — auto-commit prebuilt binaries back to repo
  # ═══════════════════════════════════════════════════════════════════════════════
  bundle-prebuilt:
    needs: [build-linux, build-macos, build-windows, build-android, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organize prebuilt directory
        run: |
          rm -rf prebuilt
          mkdir -p prebuilt/linux/x64
          mkdir -p prebuilt/macos/universal
          mkdir -p prebuilt/windows/x64
          mkdir -p prebuilt/android/arm64-v8a
          mkdir -p prebuilt/android/armeabi-v7a
          mkdir -p prebuilt/android/x86_64
          mkdir -p prebuilt/ios

          cp artifacts/linux-native-lib/x64/* prebuilt/linux/x64/ 2>/dev/null || true
          cp artifacts/macos-native-lib/universal/* prebuilt/macos/universal/ 2>/dev/null || true
          cp artifacts/windows-native-lib/x64/* prebuilt/windows/x64/ 2>/dev/null || true
          cp artifacts/android-native-lib-arm64-v8a/* prebuilt/android/arm64-v8a/ 2>/dev/null || true
          cp artifacts/android-native-lib-armeabi-v7a/* prebuilt/android/armeabi-v7a/ 2>/dev/null || true
          cp artifacts/android-native-lib-x86_64/* prebuilt/android/x86_64/ 2>/dev/null || true

          # Copy iOS XCFramework (artifact is the framework directory contents)
          rm -rf prebuilt/ios/libtorrent_flutter.xcframework
          mkdir -p prebuilt/ios/libtorrent_flutter.xcframework
          cp -R artifacts/ios-native-lib/* prebuilt/ios/libtorrent_flutter.xcframework/ 2>/dev/null || true

          # Copy XCFramework to ios/ for CocoaPods
          rm -rf ios/libtorrent_flutter.xcframework
          cp -R prebuilt/ios/libtorrent_flutter.xcframework ios/ 2>/dev/null || true
          # Remove legacy .a if present
          rm -f ios/liblibtorrent_flutter.a 2>/dev/null || true

          # Copy macOS dylib to macos/ for CocoaPods vendored_libraries
          cp prebuilt/macos/universal/liblibtorrent_flutter.dylib macos/ 2>/dev/null || true

          echo "=== Prebuilt libs ==="
          find prebuilt -type f -exec ls -lh {} \;
          ls -la macos/*.dylib 2>/dev/null || true
          find ios/libtorrent_flutter.xcframework -type f 2>/dev/null | head -10 || true

      - name: Commit prebuilt libraries
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add prebuilt/ macos/liblibtorrent_flutter.dylib ios/libtorrent_flutter.xcframework/
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "ci: update prebuilt native libraries [skip ci]"
            git push
          )

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELEASE — create a GitHub Release with native libs
  # ═══════════════════════════════════════════════════════════════════════════════
  create-release:
    needs: [bundle-prebuilt]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Package release assets
        run: |
          mkdir -p release-assets
          cd release-artifacts

          # Zip each platform
          for dir in linux-native-lib macos-native-lib windows-native-lib; do
            if [ -d "$dir" ]; then
              cd "$dir" && zip -r "../../release-assets/${dir}.zip" . && cd ..
            fi
          done
          for dir in android-native-lib-arm64-v8a android-native-lib-armeabi-v7a android-native-lib-x86_64 ios-native-lib; do
            if [ -d "$dir" ]; then
              cd "$dir" && zip -r "../../release-assets/${dir}.zip" . && cd ..
            fi
          done

          ls -la ../release-assets/

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            Prebuilt native libraries for libtorrent_flutter v${{ steps.version.outputs.version }}

            All binaries are self-contained — no system dependencies needed.
          files: release-assets/*
          make_latest: true
