name: Build & Test Native Libraries

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  LIBTORRENT_VERSION: "2.0.11"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # LINUX BUILD (static libtorrent, x64 + arm64)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
          - arch: arm64
            # GitHub's native ARM64 Linux runner — free for public repos.
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-all-dev libssl-dev \
            cmake g++ ninja-build pkg-config \
            libgtk-3-dev xvfb

      - name: Build libtorrent (static)
        run: |
          git clone --depth 1 --branch v${LIBTORRENT_VERSION} \
            --recurse-submodules https://github.com/arvidn/libtorrent.git libtorrent-src
          mkdir -p libtorrent-src/build && cd libtorrent-src/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=ON \
            -G Ninja -Wno-dev
          ninja -j$(nproc)
          echo "=== Static lib ==="
          find . -name "*.a" | head -5
        timeout-minutes: 20

      - name: Build torrent_bridge (fully self-contained)
        run: |
          LT_LIB=$(find libtorrent-src/build -name "libtorrent-rasterbar.a" | head -1)
          echo "Static lib: $LT_LIB ($( du -h $LT_LIB | cut -f1 ))"

          # Statically link OpenSSL so the resulting .so does NOT depend on
          # the user having libssl3 / libcrypto3 installed on their distro.
          # libssl-dev on Ubuntu 22.04 ships the static .a files alongside
          # the .so files. Path differs per arch:
          #   x64   -> /usr/lib/x86_64-linux-gnu/lib{ssl,crypto}.a
          #   arm64 -> /usr/lib/aarch64-linux-gnu/lib{ssl,crypto}.a
          MULTIARCH=$(dpkg-architecture -q DEB_HOST_MULTIARCH)
          SSL_A=/usr/lib/${MULTIARCH}/libssl.a
          CRYPTO_A=/usr/lib/${MULTIARCH}/libcrypto.a
          echo "Using static OpenSSL: $SSL_A $CRYPTO_A"
          test -f "$SSL_A" && test -f "$CRYPTO_A"

          mkdir -p build-linux
          g++ -shared -fPIC -O2 -std=c++17 \
            -DTORRENT_BRIDGE_EXPORTS \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build/include \
            -o build-linux/liblibtorrent_flutter.so \
            src/torrent_bridge.cpp \
            -Wl,--whole-archive "$LT_LIB" -Wl,--no-whole-archive \
            -Wl,-Bstatic -l:libssl.a -l:libcrypto.a -Wl,-Bdynamic \
            -lpthread -ldl

          ls -la build-linux/liblibtorrent_flutter.so

          # Verify no libssl/libcrypto runtime deps leaked in.
          echo "=== Runtime dependencies ==="
          ldd build-linux/liblibtorrent_flutter.so
          if ldd build-linux/liblibtorrent_flutter.so | grep -E "libssl|libcrypto"; then
            echo "❌ ERROR: .so still depends on libssl/libcrypto at runtime"
            exit 1
          fi
          echo "✅ Linux ${{ matrix.arch }} fully self-contained build succeeded"

      - name: Copy to prebuilt
        run: |
          mkdir -p prebuilt/linux/${{ matrix.arch }}
          cp build-linux/liblibtorrent_flutter.so prebuilt/linux/${{ matrix.arch }}/
          ls -la prebuilt/linux/${{ matrix.arch }}/

      - name: Setup Flutter
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Run Dart smoke test
        if: matrix.arch == 'x64'
        run: |
          cd example
          flutter pub get
          xvfb-run flutter test integration_test/ -d linux --timeout 60s || echo "Test skipped (may need display)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-native-lib-${{ matrix.arch }}
          path: prebuilt/linux/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # MACOS BUILD (universal2 dylib: arm64 + x86_64, both cross-compiled on
  # an arm64 runner — GitHub no longer offers macos-13 Intel runners as of
  # the macos-14 / macos-15 era. Apple's clang handles -arch x86_64 fine,
  # but Homebrew on Apple Silicon only ships arm64 binaries, so we
  # cross-compile OpenSSL ourselves for both slices and use Boost
  # (headers-only as far as libtorrent's compile is concerned).
  # ═══════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.14"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Download Boost source (headers + bcp not needed)
        run: |
          curl -fsSL https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz -o boost.tar.gz
          tar xf boost.tar.gz
          echo "BOOST_ROOT=$PWD/boost_1_84_0" >> $GITHUB_ENV

      - name: Cross-compile OpenSSL 3.2.1 for macOS arm64 + x86_64
        run: |
          git clone --depth 1 --branch openssl-3.2.1 https://github.com/openssl/openssl.git openssl-src

          build_openssl() {
            local target="$1"
            local arch="$2"
            local prefix="$PWD/openssl-install-macos-${arch}"
            echo "=== Building OpenSSL: $target ($arch) ==="
            (
              cd openssl-src
              make distclean 2>/dev/null || true
              CC="$(xcrun -sdk macosx -find clang)" \
              CFLAGS="-arch $arch -mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET} -isysroot $(xcrun --sdk macosx --show-sdk-path)" \
              ./Configure $target \
                no-shared no-tests no-ui-console no-docs \
                --prefix="$prefix"
              make -j$(sysctl -n hw.ncpu) build_libs
              make install_dev
            )
          }

          build_openssl "darwin64-arm64-cc" "arm64"
          build_openssl "darwin64-x86_64-cc" "x86_64"

          echo "=== OpenSSL slices ==="
          ls -la openssl-install-macos-arm64/lib/
          ls -la openssl-install-macos-x86_64/lib/
        timeout-minutes: 25

      - name: Build libtorrent + bridge for one arch
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v${LIBTORRENT_VERSION} \
            --recurse-submodules https://github.com/arvidn/libtorrent.git libtorrent-src

          build_slice() {
            local arch="$1"
            local slice_dir="$PWD/libtorrent-src/build-${arch}"
            local ossl_root="$PWD/openssl-install-macos-${arch}"
            local sdk
            sdk=$(xcrun --sdk macosx --show-sdk-path)
            
            # Fix: Handle arm64 vs x86_64 minimum OS targets dynamically
            local min_target="${MACOSX_DEPLOYMENT_TARGET}"
            if [ "${arch}" = "arm64" ]; then
              min_target="11.0"
            fi

            echo "═══ Building slice: ${arch} (Targeting macOS ${min_target}) ═══"

            mkdir -p "$slice_dir" && (
              cd "$slice_dir"
              cmake .. \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_ARCHITECTURES=${arch} \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=${min_target} \
                -DCMAKE_OSX_SYSROOT=${sdk} \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DBUILD_SHARED_LIBS=OFF \
                -Ddeprecated-functions=OFF \
                -Dencryption=ON \
                -DOPENSSL_ROOT_DIR="${ossl_root}" \
                -DOPENSSL_USE_STATIC_LIBS=ON \
                -DBOOST_ROOT="${BOOST_ROOT}" \
                -DBoost_INCLUDE_DIR="${BOOST_ROOT}" \
                -G Ninja -Wno-dev
              ninja -j$(sysctl -n hw.ncpu)
            )

            local lt_lib
            lt_lib=$(find "${slice_dir}" -name "libtorrent-rasterbar.a" | head -1)
            echo "libtorrent ${arch}: $lt_lib"

            local out_dir="$PWD/build-macos-${arch}"
            mkdir -p "$out_dir"

            clang++ -shared -O2 -std=c++17 \
              -arch ${arch} \
              -mmacosx-version-min=${min_target} \
              -isysroot ${sdk} \
              -DTORRENT_BRIDGE_EXPORTS \
              -DTORRENT_NO_DEPRECATE \
              -Ilibtorrent-src/include \
              -I${slice_dir}/include \
              -I${BOOST_ROOT} \
              -I${ossl_root}/include \
              -o "${out_dir}/liblibtorrent_flutter.dylib" \
              src/torrent_bridge.cpp \
              -Wl,-force_load,"${lt_lib}" \
              ${ossl_root}/lib/libssl.a ${ossl_root}/lib/libcrypto.a \
              -framework CoreFoundation \
              -framework SystemConfiguration \
              -framework Security \
              -framework IOKit \
              -install_name @rpath/liblibtorrent_flutter.dylib

            if otool -L "${out_dir}/liblibtorrent_flutter.dylib" | grep -q /opt/homebrew; then
              echo "❌ ERROR: dylib references Homebrew paths"
              otool -L "${out_dir}/liblibtorrent_flutter.dylib"
              exit 1
            fi
            echo "✅ ${arch} dylib built"
          }

          build_slice arm64
          build_slice x86_64
        timeout-minutes: 45
      - name: Lipo arm64 + x86_64 into a universal2 dylib
        run: |
          mkdir -p build-macos-universal
          lipo -create \
            build-macos-arm64/liblibtorrent_flutter.dylib \
            build-macos-x86_64/liblibtorrent_flutter.dylib \
            -output build-macos-universal/liblibtorrent_flutter.dylib
          echo "=== lipo info ==="
          lipo -info build-macos-universal/liblibtorrent_flutter.dylib
          file  build-macos-universal/liblibtorrent_flutter.dylib

      - name: Copy to prebuilt
        run: |
          mkdir -p prebuilt/macos/universal
          cp build-macos-universal/liblibtorrent_flutter.dylib prebuilt/macos/universal/
          cp build-macos-universal/liblibtorrent_flutter.dylib macos/
          ls -la prebuilt/macos/universal/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Run Dart smoke test
        run: |
          cd example
          flutter pub get
          flutter test integration_test/ -d macos --timeout 60s || echo "Test completed or skipped"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-native-lib
          path: prebuilt/macos/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # WINDOWS BUILD (static libtorrent, x64 + arm64 cross-compiled)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows-static
            cmake_arch: x64
          - arch: arm64
            triplet: arm64-windows-static
            cmake_arch: ARM64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Install libtorrent via vcpkg (static, ${{ matrix.triplet }})
        run: C:\vcpkg\vcpkg.exe install libtorrent:${{ matrix.triplet }}
        timeout-minutes: 90

      - name: Build native library
        run: |
          mkdir build-win
          cd build-win
          cmake ..\src `
            -A ${{ matrix.cmake_arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build . --config Release

      - name: Copy to prebuilt
        run: |
          New-Item -ItemType Directory -Force "prebuilt\windows\${{ matrix.arch }}"
          Get-ChildItem -Path build-win -Recurse -Filter "*.dll" | Copy-Item -Destination "prebuilt\windows\${{ matrix.arch }}\"
          Get-ChildItem "prebuilt\windows\${{ matrix.arch }}\"

      - name: Setup Flutter
        if: matrix.arch == 'x64'
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Run Dart smoke test
        if: matrix.arch == 'x64'
        run: |
          cd example
          flutter pub get
          flutter test integration_test/ -d windows --timeout 60s
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-lib-${{ matrix.arch }}
          path: prebuilt/windows/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # ANDROID BUILD (already static)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3

      - name: Download Boost headers
        run: |
          wget -q https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz
          tar xf boost_1_84_0.tar.gz
          echo "BOOST_ROOT=$PWD/boost_1_84_0" >> $GITHUB_ENV

      - name: Cross-compile OpenSSL for Android
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Map ABI to OpenSSL target
          case "${{ matrix.abi }}" in
            arm64-v8a)   OSSL_TARGET="android-arm64" ;;
            armeabi-v7a) OSSL_TARGET="android-arm" ;;
            x86_64)      OSSL_TARGET="android-x86_64" ;;
          esac

          git clone --depth 1 --branch openssl-3.2.1 https://github.com/openssl/openssl.git openssl-src
          cd openssl-src
          export ANDROID_NDK_ROOT=$NDK
          export PATH=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          # armeabi-v7a: OpenSSL's 32-bit ARM assembly uses R_ARM_REL32 relocations
          # against OPENSSL_armcap_P which can't be made PIC. Use no-asm for 32-bit.
          EXTRA_OPTS=""
          if [ "${{ matrix.abi }}" = "armeabi-v7a" ]; then
            EXTRA_OPTS="no-asm"
          fi

          ./Configure $OSSL_TARGET -D__ANDROID_API__=24 \
            --prefix=$PWD/../openssl-install \
            -fPIC \
            no-shared no-tests no-ui-console no-docs $EXTRA_OPTS
          make -j$(nproc)
          make install_sw
          cd ..
          echo "OPENSSL_ROOT=$PWD/openssl-install" >> $GITHUB_ENV
          echo "=== OpenSSL installed ==="
          ls -la openssl-install/lib*/
        timeout-minutes: 15

      - name: Build libtorrent for Android (with encryption)
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          git clone --depth 1 --recurse-submodules --branch v2.0.11 https://github.com/arvidn/libtorrent.git libtorrent-src
          cd libtorrent-src

          # Detect OpenSSL lib directory (lib or lib64 depending on ABI)
          if [ -d "$OPENSSL_ROOT/lib64" ]; then
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib64"
          else
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib"
          fi

          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK=$NDK \
            -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.abi }} \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared \
            -DCMAKE_SYSTEM_VERSION=24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Dstatic_runtime=ON \
            -Ddeprecated-functions=OFF \
            -Dencryption=ON \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DOPENSSL_INCLUDE_DIR=$OPENSSL_ROOT/include \
            -DOPENSSL_CRYPTO_LIBRARY=$OSSL_LIB_DIR/libcrypto.a \
            -DOPENSSL_SSL_LIBRARY=$OSSL_LIB_DIR/libssl.a \
            -DBOOST_ROOT=$BOOST_ROOT \
            -DBoost_INCLUDE_DIR=$BOOST_ROOT \
            -G Ninja \
            -Wno-dev
          ninja -j$(nproc)
          echo "=== Built ==="
          find . -name "*.a" | head -5
        timeout-minutes: 30

      - name: Build torrent_bridge for Android
        env:
          NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          LT_BUILD_DIR=$PWD/libtorrent-src/build
          LT_SRC_DIR=$PWD/libtorrent-src
          LT_LIB=$(find $LT_BUILD_DIR -name "libtorrent-rasterbar.a" | head -1)
          echo "libtorrent lib: $LT_LIB"

          case "${{ matrix.abi }}" in
            arm64-v8a)   TARGET="aarch64-linux-android24" ;;
            armeabi-v7a) TARGET="armv7a-linux-androideabi24" ;;
            x86_64)      TARGET="x86_64-linux-android24" ;;
          esac

          # Detect OpenSSL lib directory
          if [ -d "$OPENSSL_ROOT/lib64" ]; then
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib64"
          else
            OSSL_LIB_DIR="$OPENSSL_ROOT/lib"
          fi

          mkdir -p build-bridge && cd build-bridge

          # Encryption is now ON — link OpenSSL and let libtorrent use it.
          # Do NOT define TORRENT_USE_OPENSSL or TORRENT_USE_SSL manually;
          # libtorrent's config.hpp auto-detects via the compiled-in support.
          $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ \
            --target=$TARGET \
            -shared -fPIC -O3 -std=c++17 \
            -flto \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DBOOST_NO_IOSTREAM \
            -I$LT_SRC_DIR/include \
            -I$LT_BUILD_DIR/include \
            -I$BOOST_ROOT \
            -I$OPENSSL_ROOT/include \
            -o liblibtorrent_flutter.so \
            ../src/torrent_bridge.cpp \
            -Wl,--whole-archive $LT_LIB -Wl,--no-whole-archive \
            $OSSL_LIB_DIR/libssl.a $OSSL_LIB_DIR/libcrypto.a \
            -llog \
            -static-libstdc++

          ls -la liblibtorrent_flutter.so
          echo "✅ Built for ${{ matrix.abi }}"

      - name: Copy to prebuilt
        run: |
          mkdir -p prebuilt/android/${{ matrix.abi }}
          cp build-bridge/liblibtorrent_flutter.so prebuilt/android/${{ matrix.abi }}/
          ls -la prebuilt/android/${{ matrix.abi }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-lib-${{ matrix.abi }}
          path: prebuilt/android/${{ matrix.abi }}/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # iOS BUILD (static library, arm64 + x86_64 simulator)
  # ═══════════════════════════════════════════════════════════════════════════════
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install boost cmake ninja

      # ─────────────────────────────────────────────────────────────────
      # Cross-compile OpenSSL 3.2.1 statically for all 3 iOS slices.
      # Mirrors the Android encryption build (1.7.6+).
      # ─────────────────────────────────────────────────────────────────
      - name: Cross-compile OpenSSL for iOS (device + simulator)
        run: |
          git clone --depth 1 --branch openssl-3.2.1 \
            https://github.com/openssl/openssl.git openssl-src

          build_openssl() {
            local target="$1"
            local sdk="$2"
            local arch="$3"
            local extra_cflags="$4"
            local prefix="$PWD/openssl-install-${target}-${arch}"
            echo "=== Building OpenSSL: $target ($arch) ==="
            (
              cd openssl-src
              make distclean 2>/dev/null || true
              # xcrun-style targets in OpenSSL 3 auto-detect SDK via xcrun.
              # CFLAGS extra arch overrides the default for the simulator
              # (where iossimulator-xcrun picks host arch by default).
              CC="$(xcrun -sdk $sdk -find clang)" \
              CFLAGS="-arch $arch -isysroot $(xcrun --sdk $sdk --show-sdk-path) -mios-version-min=13.0 -fembed-bitcode $extra_cflags" \
              ./Configure $target \
                no-shared no-tests no-ui-console no-docs \
                no-asm \
                --prefix="$prefix"
              make -j$(sysctl -n hw.ncpu) build_libs
              make install_dev
            )
          }

          # iOS device arm64
          build_openssl "ios64-xcrun" "iphoneos" "arm64" "-mios-version-min=13.0"
          # iOS simulator arm64 (Apple Silicon Macs)
          build_openssl "iossimulator-xcrun" "iphonesimulator" "arm64" "-mios-simulator-version-min=13.0"
          # iOS simulator x86_64 (Intel Macs)
          build_openssl "iossimulator-xcrun" "iphonesimulator" "x86_64" "-mios-simulator-version-min=13.0"

          echo "=== OpenSSL slices built ==="
          ls -la openssl-install-ios64-xcrun-arm64/lib/
          ls -la openssl-install-iossimulator-xcrun-arm64/lib/
          ls -la openssl-install-iossimulator-xcrun-x86_64/lib/
        timeout-minutes: 30

      - name: Build libtorrent for iOS arm64 (with encryption)
        run: |
          git clone --depth 1 --branch v${LIBTORRENT_VERSION} \
            --recurse-submodules https://github.com/arvidn/libtorrent.git libtorrent-src
          cd libtorrent-src && mkdir build-ios && cd build-ios

          # iOS arm64 — device, encryption ON, statically linked OpenSSL
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          OSSL_ROOT="$GITHUB_WORKSPACE/openssl-install-ios64-xcrun-arm64"
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$IOS_SDK \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=OFF \
            -Dencryption=ON \
            -DOPENSSL_ROOT_DIR="$OSSL_ROOT" \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DBOOST_ROOT=$(brew --prefix boost) \
            -DBoost_INCLUDE_DIR=$(brew --prefix boost)/include \
            -G Ninja -Wno-dev
          ninja -j$(sysctl -n hw.ncpu)
          echo "=== iOS arm64 static lib ==="
          find . -name "*.a" | head -5
        timeout-minutes: 25

      - name: Build torrent_bridge for iOS arm64
        run: |
          LT_LIB=$(find libtorrent-src/build-ios -name "libtorrent-rasterbar.a" | head -1)
          BOOST_INC=$(brew --prefix boost)/include
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          OSSL_ROOT="$GITHUB_WORKSPACE/openssl-install-ios64-xcrun-arm64"
          echo "libtorrent lib: $LT_LIB"

          mkdir -p build-ios-arm64
          # NOTE: -DTORRENT_USE_SSL=0 removed — encryption is now ON.
          # libtorrent's installed config.hpp has TORRENT_USE_OPENSSL/LIBCRYPTO
          # auto-defined; redefining TORRENT_USE_SSL=0 here would create an
          # ABI mismatch and the bridge would silently see encryption=off.
          # -O3 (no -flto: bitcode .o files break `lipo -create` on the
          # merged static lib with "Unknown header: 0xb17c0de").
          clang++ -c -O3 -std=c++17 -fPIC \
            -target arm64-apple-ios13.0 \
            -isysroot $IOS_SDK \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DBOOST_NO_IOSTREAM \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build-ios/include \
            -I${BOOST_INC} \
            -I${OSSL_ROOT}/include \
            -o build-ios-arm64/torrent_bridge.o \
            src/torrent_bridge.cpp

          # Create a fat static library: bridge + libtorrent + OpenSSL
          cp "$LT_LIB" build-ios-arm64/libtorrent-rasterbar.a
          ar x build-ios-arm64/libtorrent-rasterbar.a
          mkdir -p build-ios-arm64/lt_objects
          mv *.o build-ios-arm64/lt_objects/ 2>/dev/null || true

          # Extract OpenSSL .a contents so all symbols (RC4, RSA, SHA, etc.
          # used by libtorrent's MSE handshake) end up in the merged lib.
          mkdir -p build-ios-arm64/ssl_objects && cd build-ios-arm64/ssl_objects
          ar x ${OSSL_ROOT}/lib/libssl.a
          ar x ${OSSL_ROOT}/lib/libcrypto.a
          cd ../..

          ar rcs build-ios-arm64/liblibtorrent_flutter.a \
            build-ios-arm64/torrent_bridge.o \
            build-ios-arm64/lt_objects/*.o \
            build-ios-arm64/ssl_objects/*.o

          ls -la build-ios-arm64/liblibtorrent_flutter.a
          echo "✅ iOS arm64 static build (encryption ON) succeeded"

      - name: Build libtorrent for iOS Simulator x86_64 (with encryption)
        run: |
          cd libtorrent-src && mkdir build-sim-x86_64 && cd build-sim-x86_64

          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          OSSL_ROOT="$GITHUB_WORKSPACE/openssl-install-iossimulator-xcrun-x86_64"
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_SYSROOT=$SIM_SDK \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=OFF \
            -Dencryption=ON \
            -DOPENSSL_ROOT_DIR="$OSSL_ROOT" \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DBOOST_ROOT=$(brew --prefix boost) \
            -DBoost_INCLUDE_DIR=$(brew --prefix boost)/include \
            -G Ninja -Wno-dev
          ninja -j$(sysctl -n hw.ncpu)
        timeout-minutes: 25

      - name: Build torrent_bridge for iOS Simulator x86_64
        run: |
          LT_LIB=$(find libtorrent-src/build-sim-x86_64 -name "libtorrent-rasterbar.a" | head -1)
          BOOST_INC=$(brew --prefix boost)/include
          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          OSSL_ROOT="$GITHUB_WORKSPACE/openssl-install-iossimulator-xcrun-x86_64"

          mkdir -p build-ios-sim-x86_64
          clang++ -c -O3 -std=c++17 -fPIC \
            -target x86_64-apple-ios13.0-simulator \
            -isysroot $SIM_SDK \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DBOOST_NO_IOSTREAM \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build-sim-x86_64/include \
            -I${BOOST_INC} \
            -I${OSSL_ROOT}/include \
            -o build-ios-sim-x86_64/torrent_bridge.o \
            src/torrent_bridge.cpp

          cp "$LT_LIB" build-ios-sim-x86_64/libtorrent-rasterbar.a
          ar x build-ios-sim-x86_64/libtorrent-rasterbar.a
          mkdir -p build-ios-sim-x86_64/lt_objects
          mv *.o build-ios-sim-x86_64/lt_objects/ 2>/dev/null || true
          mkdir -p build-ios-sim-x86_64/ssl_objects && cd build-ios-sim-x86_64/ssl_objects
          ar x ${OSSL_ROOT}/lib/libssl.a
          ar x ${OSSL_ROOT}/lib/libcrypto.a
          cd ../..
          ar rcs build-ios-sim-x86_64/liblibtorrent_flutter.a \
            build-ios-sim-x86_64/torrent_bridge.o \
            build-ios-sim-x86_64/lt_objects/*.o \
            build-ios-sim-x86_64/ssl_objects/*.o

          ls -la build-ios-sim-x86_64/liblibtorrent_flutter.a
          echo "✅ iOS Simulator x86_64 (encryption ON) succeeded"

      - name: Build libtorrent for iOS Simulator arm64 (Apple Silicon, with encryption)
        run: |
          cd libtorrent-src && mkdir build-sim-arm64 && cd build-sim-arm64

          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          OSSL_ROOT="$GITHUB_WORKSPACE/openssl-install-iossimulator-xcrun-arm64"
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$SIM_SDK \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -Ddeprecated-functions=OFF \
            -Dencryption=ON \
            -DOPENSSL_ROOT_DIR="$OSSL_ROOT" \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DBOOST_ROOT=$(brew --prefix boost) \
            -DBoost_INCLUDE_DIR=$(brew --prefix boost)/include \
            -G Ninja -Wno-dev
          ninja -j$(sysctl -n hw.ncpu)
        timeout-minutes: 25

      - name: Build torrent_bridge for iOS Simulator arm64
        run: |
          LT_LIB=$(find libtorrent-src/build-sim-arm64 -name "libtorrent-rasterbar.a" | head -1)
          BOOST_INC=$(brew --prefix boost)/include
          SIM_SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          OSSL_ROOT="$GITHUB_WORKSPACE/openssl-install-iossimulator-xcrun-arm64"

          mkdir -p build-ios-sim-arm64
          clang++ -c -O3 -std=c++17 -fPIC \
            -target arm64-apple-ios13.0-simulator \
            -isysroot $SIM_SDK \
            -DTORRENT_BRIDGE_EXPORTS \
            -DTORRENT_NO_DEPRECATE \
            -DBOOST_NO_IOSTREAM \
            -Ilibtorrent-src/include \
            -Ilibtorrent-src/build-sim-arm64/include \
            -I${BOOST_INC} \
            -I${OSSL_ROOT}/include \
            -o build-ios-sim-arm64/torrent_bridge.o \
            src/torrent_bridge.cpp

          cp "$LT_LIB" build-ios-sim-arm64/libtorrent-rasterbar.a
          ar x build-ios-sim-arm64/libtorrent-rasterbar.a
          mkdir -p build-ios-sim-arm64/lt_objects
          mv *.o build-ios-sim-arm64/lt_objects/ 2>/dev/null || true
          mkdir -p build-ios-sim-arm64/ssl_objects && cd build-ios-sim-arm64/ssl_objects
          ar x ${OSSL_ROOT}/lib/libssl.a
          ar x ${OSSL_ROOT}/lib/libcrypto.a
          cd ../..
          ar rcs build-ios-sim-arm64/liblibtorrent_flutter.a \
            build-ios-sim-arm64/torrent_bridge.o \
            build-ios-sim-arm64/lt_objects/*.o \
            build-ios-sim-arm64/ssl_objects/*.o

          ls -la build-ios-sim-arm64/liblibtorrent_flutter.a
          echo "✅ iOS Simulator arm64 (encryption ON) succeeded"

      - name: Create XCFramework (device + universal simulator)
        run: |
          # Merge x86_64 + arm64 simulator slices into a fat simulator lib
          mkdir -p build-ios-sim-universal
          lipo -create \
            build-ios-sim-x86_64/liblibtorrent_flutter.a \
            build-ios-sim-arm64/liblibtorrent_flutter.a \
            -output build-ios-sim-universal/liblibtorrent_flutter.a
          lipo -info build-ios-sim-universal/liblibtorrent_flutter.a

          # Prepare headers directory
          mkdir -p build-ios-headers
          cp src/torrent_bridge.h build-ios-headers/

          # Create XCFramework with device + simulator
          rm -rf prebuilt/ios/libtorrent_flutter.xcframework
          xcodebuild -create-xcframework \
            -library build-ios-arm64/liblibtorrent_flutter.a \
            -headers build-ios-headers/ \
            -library build-ios-sim-universal/liblibtorrent_flutter.a \
            -headers build-ios-headers/ \
            -output prebuilt/ios/libtorrent_flutter.xcframework

          echo "=== XCFramework contents ==="
          find prebuilt/ios/libtorrent_flutter.xcframework -type f | head -20
          echo "✅ XCFramework created successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-lib
          path: prebuilt/ios/libtorrent_flutter.xcframework/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # BUNDLE — auto-commit prebuilt binaries back to repo
  # ═══════════════════════════════════════════════════════════════════════════════
  bundle-prebuilt:
    needs: [build-linux, build-macos, build-windows, build-android, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organize prebuilt directory
        run: |
          rm -rf prebuilt
          mkdir -p prebuilt/linux/x64
          mkdir -p prebuilt/linux/arm64
          mkdir -p prebuilt/macos/universal
          mkdir -p prebuilt/windows/x64
          mkdir -p prebuilt/windows/arm64
          mkdir -p prebuilt/android/arm64-v8a
          mkdir -p prebuilt/android/armeabi-v7a
          mkdir -p prebuilt/android/x86_64
          mkdir -p prebuilt/ios

          cp artifacts/linux-native-lib-x64/x64/* prebuilt/linux/x64/ 2>/dev/null || true
          cp artifacts/linux-native-lib-arm64/arm64/* prebuilt/linux/arm64/ 2>/dev/null || true
          cp artifacts/macos-native-lib/universal/* prebuilt/macos/universal/ 2>/dev/null || true
          cp artifacts/windows-native-lib-x64/x64/* prebuilt/windows/x64/ 2>/dev/null || true
          cp artifacts/windows-native-lib-arm64/arm64/* prebuilt/windows/arm64/ 2>/dev/null || true
          cp artifacts/android-native-lib-arm64-v8a/* prebuilt/android/arm64-v8a/ 2>/dev/null || true
          cp artifacts/android-native-lib-armeabi-v7a/* prebuilt/android/armeabi-v7a/ 2>/dev/null || true
          cp artifacts/android-native-lib-x86_64/* prebuilt/android/x86_64/ 2>/dev/null || true

          # Copy iOS XCFramework (artifact is the framework directory contents)
          rm -rf prebuilt/ios/libtorrent_flutter.xcframework
          mkdir -p prebuilt/ios/libtorrent_flutter.xcframework
          cp -R artifacts/ios-native-lib/* prebuilt/ios/libtorrent_flutter.xcframework/ 2>/dev/null || true

          # Copy XCFramework to ios/ for CocoaPods
          rm -rf ios/libtorrent_flutter.xcframework
          cp -R prebuilt/ios/libtorrent_flutter.xcframework ios/ 2>/dev/null || true
          # Remove legacy .a if present
          rm -f ios/liblibtorrent_flutter.a 2>/dev/null || true

          # Copy macOS dylib to macos/ for CocoaPods vendored_libraries
          cp prebuilt/macos/universal/liblibtorrent_flutter.dylib macos/ 2>/dev/null || true

          echo "=== Prebuilt libs ==="
          find prebuilt -type f -exec ls -lh {} \;
          ls -la macos/*.dylib 2>/dev/null || true
          find ios/libtorrent_flutter.xcframework -type f 2>/dev/null | head -10 || true

      - name: Commit prebuilt libraries
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add prebuilt/ macos/liblibtorrent_flutter.dylib ios/libtorrent_flutter.xcframework/
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "ci: update prebuilt native libraries [skip ci]"
            git push
          )

  # ═══════════════════════════════════════════════════════════════════════════════
  # RELEASE — create a GitHub Release with native libs
  # ═══════════════════════════════════════════════════════════════════════════════
  create-release:
    needs: [bundle-prebuilt]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Package release assets
        run: |
          mkdir -p release-assets
          cd release-artifacts

          # Zip each per-arch / per-platform artifact directory. Asset names
          # MUST match what the per-platform install scripts request:
          #   - Linux:   linux-native-lib-{x64,arm64}.zip      (CMakeLists.txt)
          #   - macOS:   macos-native-lib.zip                  (podspec)
          #   - Windows: windows-native-lib-{x64,arm64}.zip    (CMakeLists.txt)
          #   - Android: android-native-lib-{abi}.zip          (build.gradle)
          #   - iOS:     ios-native-lib.zip                    (podspec)
          for dir in \
              linux-native-lib-x64 linux-native-lib-arm64 \
              macos-native-lib \
              windows-native-lib-x64 windows-native-lib-arm64 \
              android-native-lib-arm64-v8a android-native-lib-armeabi-v7a android-native-lib-x86_64 \
              ios-native-lib; do
            if [ -d "$dir" ]; then
              cd "$dir" && zip -r "../../release-assets/${dir}.zip" . && cd ..
            fi
          done

          ls -la ../release-assets/

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            Prebuilt native libraries for libtorrent_flutter v${{ steps.version.outputs.version }}

            All binaries are self-contained — no system dependencies needed.
          files: release-assets/*
          make_latest: true
